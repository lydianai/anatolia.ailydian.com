version: '3.8'

services:
  # PostgreSQL - Ana veritabanı
  postgres:
    image: postgres:16-alpine
    container_name: tdm-postgres
    environment:
      POSTGRES_DB: turk_dijital_metropol
      POSTGRES_USER: tdm_user
      POSTGRES_PASSWORD: tdm_secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdm_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tdm-network

  # Redis - Cache ve session
  redis:
    image: redis:7-alpine
    container_name: tdm-redis
    command: redis-server --appendonly yes --requirepass tdm_redis_password_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tdm-network

  # MongoDB - Analytics ve logs
  mongodb:
    image: mongo:7
    container_name: tdm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: tdm_mongo_user
      MONGO_INITDB_ROOT_PASSWORD: tdm_mongo_password_2024
      MONGO_INITDB_DATABASE: tdm_analytics
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tdm-network

  # RabbitMQ - Message queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tdm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: tdm_rabbit_user
      RABBITMQ_DEFAULT_PASS: tdm_rabbit_password_2024
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tdm-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: tdm-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://tdm_user:tdm_secure_password_2024@postgres:5432/turk_dijital_metropol
      REDIS_URL: redis://:tdm_redis_password_2024@redis:6379
      MONGODB_URL: mongodb://tdm_mongo_user:tdm_mongo_password_2024@mongodb:27017/tdm_analytics?authSource=admin
      RABBITMQ_URL: amqp://tdm_rabbit_user:tdm_rabbit_password_2024@rabbitmq:5672
      JWT_SECRET: tdm_jwt_super_secret_key_2024_change_in_production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - tdm-network
    command: npm run dev

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: tdm-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
    depends_on:
      - backend
    networks:
      - tdm-network
    command: npm run dev

  # Prometheus - Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: tdm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - tdm-network

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: tdm-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: tdm_grafana_admin_2024
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - tdm-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  tdm-network:
    driver: bridge
